<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>政企工作台预览</title>
  <style>

    :root {
      --color-brand-red: #E60012;
      --color-brand-red-dark: #C40010;
      --color-brand-red-light: #FFF1F2;
      --color-brand-red-border: #FFCDD2;
      --color-business-blue: #2563EB;
      --color-business-blue-light: #EFF6FF;
      --color-business-blue-border: #BFDBFE;
      --color-success: #16A34A;
      --color-success-light: #F0FDF4;
      --color-warning: #F97316;
      --color-warning-light: #FFF7ED;
      --color-danger: #DC2626;
      --color-danger-light: #FEF2F2;
      --color-text-primary: #0F172A;
      --color-text-secondary: #334155;
      --color-text-muted: #64748B;
      --color-text-placeholder: #94A3B8;
      --color-page-bg: #F4F6F9;
      --color-card-bg: #FFFFFF;
      --color-subtle-bg: #F8FAFC;
      --color-border: #E2E8F0;
      --color-border-light: #F1F5F9;
      --color-card-border: #E8EDF3;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-pill: 999px;
      --shadow-card: 0 6px 18px rgba(15, 23, 42, 0.04);
      --shadow-card-light: 0 2px 8px rgba(15, 23, 42, 0.03);
      --shadow-badge: 0 2px 6px rgba(230, 0, 18, 0.22);
      --shadow-sheet: 0 -12px 34px rgba(15, 23, 42, 0.16);
      --height-tabbar: 58px;
      --size-icon-box: 46px;
      --size-icon: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    body { min-height: 100vh; background: #E5E7EB; display: flex; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif; color: var(--color-text-primary); }
    .phone { width: min(414px, 100vw); height: min(896px, 100vh); background: radial-gradient(circle at 50% -120px, rgba(37,99,235,.08), transparent 320px), var(--color-page-bg); position: relative; overflow: hidden; box-shadow: 0 18px 48px rgba(15,23,42,.14); }
    .content { height: 100%; overflow-y: auto; padding-bottom: calc(var(--height-tabbar) + 20px); }
    .content.apps { overflow-y: auto; }
    .role-switch { height: 34px; margin: 6px 12px 7px; padding: 4px; background: rgba(255,255,255,.96); border: 1px solid var(--color-card-border); border-radius: 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-card-light); }
    .role-label { font-size: 12px; color: var(--color-text-muted); padding-left: 6px; font-weight: 500; }
    .role-buttons { display: flex; background: var(--color-subtle-bg); border-radius: var(--radius-pill); padding: 2px; border: 1px solid var(--color-border-light); }
    .role-btn { border: 0; background: transparent; padding: 4px 10px; border-radius: var(--radius-pill); color: var(--color-text-muted); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .18s ease; }
    .role-btn.active { background: var(--color-brand-red); color: #fff; font-weight: 700; box-shadow: 0 4px 10px rgba(230,0,18,.16); }
    .profile-card, .card { margin: 0 12px 8px; background: var(--color-card-bg); border: 1px solid var(--color-card-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
    .profile-card { min-height: 70px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .profile-info { display: flex; align-items: center; flex: 1; min-width: 0; }
    .avatar-wrap { width: 40px; height: 40px; flex-shrink: 0; border-radius: 14px; background: var(--color-business-blue-light); color: var(--color-business-blue); margin-right: 10px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(37,99,235,.08); }
    .avatar-wrap svg { width: 22px; height: 22px; stroke-width: 1.5; }
    .profile-text { flex: 1; min-width: 0; }
    .name-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; min-width: 0; }
    .user-name { font-size: 17px; font-weight: 800; color: var(--color-text-primary); letter-spacing: 0; }
    .user-role { font-size: 10px; color: var(--color-brand-red); background: var(--color-brand-red-light); border: 1px solid var(--color-brand-red-border); border-radius: var(--radius-pill); padding: 2px 7px; font-weight: 600; white-space: nowrap; }
    .org-line { display: block; font-size: 11px; line-height: 1.45; color: var(--color-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .muted { color: var(--color-text-placeholder); }
    .logout-btn { width: 22px; height: 22px; margin-left: auto; border: 0; background: transparent; padding: 0; display: flex; align-items: center; justify-content: center; color: #9AA7B8; cursor: pointer; transition: color .18s, transform .18s; flex-shrink: 0; }
    .logout-btn:active { color: var(--color-danger); transform: scale(.94); }
    .logout-btn svg { width: 16px; height: 16px; stroke-width: 1.8; }
    .manager-prom-bar { margin: -1px 0 8px; padding: 8px 10px; border-radius: var(--radius-md); background: #F8FAFC; border: 1px solid #E8EDF3; display: grid; grid-template-columns: 1fr auto; gap: 7px 10px; align-items: center; box-shadow: var(--shadow-card-light); }
    .prom-main { font-size: 12px; color: var(--color-text-secondary); font-weight: 700; }
    .prom-main .unit { color: var(--color-text-muted); font-weight: 500; margin-left: 4px; }
    .prom-level { justify-self: end; font-size: 12px; color: var(--color-text-secondary); }
    .prom-level .text-green { color: #7FAAF4 !important; }
    .prom-condition { font-size: 12px; color: var(--color-text-muted); }
    .prom-rule { justify-self: end; font-size: 12px; color: #3C84EA; font-weight: 700; cursor: pointer; }
    .prom-link { cursor: pointer; position: relative; }
    .prom-link:active { opacity: .72; }
    .prom-link .val { text-decoration: none; }
    .detail-mask { position: absolute; inset: 0; background: rgba(15,23,42,.32); z-index: 120; display: none; align-items: flex-end; }
    .detail-mask.show { display: flex; }
    .detail-sheet { width: 100%; max-height: 82%; overflow-y: auto; background: #fff; border-radius: 20px 20px 0 0; padding: 18px 16px 22px; box-shadow: var(--shadow-sheet); animation: sheetUp .18s ease-out; border: 1px solid rgba(226,232,240,.8); border-bottom: 0; }
    @keyframes sheetUp { from { transform: translateY(18px); opacity: .7; } to { transform: translateY(0); opacity: 1; } }
    .detail-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
    .detail-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .detail-close { width: 30px; height: 30px; border: 1px solid var(--color-border-light); background: var(--color-subtle-bg); border-radius: var(--radius-pill); color: var(--color-text-placeholder); font-size: 24px; line-height: 24px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .detail-desc { font-size: 13px; color: var(--color-text-muted); line-height: 1.55; margin-bottom: 12px; }
    .detail-section { margin-top: 12px; padding: 12px; border: 1px solid var(--color-card-border); border-radius: var(--radius-md); background: var(--color-subtle-bg); }
    .detail-section-title { font-size: 15px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; }
    .condition-row { margin: 9px 0 12px; }
    .condition-label { font-size: 13px; color: var(--color-text-muted); margin-bottom: 7px; }
    .condition-progress { display: flex; align-items: center; gap: 9px; }
    .condition-track { flex: 1; height: 6px; border-radius: var(--radius-pill); background: var(--color-brand-red-light); overflow: hidden; }
    .condition-fill { height: 100%; width: 100%; border-radius: inherit; background: var(--color-brand-red); }
    .condition-value { width: 74px; font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
    .grade-line { font-size: 15px; color: var(--color-text-secondary); line-height: 1.85; }
    .grade-num { color: var(--color-brand-red); font-weight: 800; }
    .grade-muted { display: block; color: var(--color-text-placeholder); font-size: 13px; line-height: 1.35; }
    .grade-green { color: var(--color-brand-red); font-weight: 800; }
    .export-btn { border: 0; background: var(--color-business-blue-light); color: var(--color-business-blue); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-pill); cursor: pointer; margin-left: 10px; }
    .export-btn:active, .detail-tab.active { background: var(--color-business-blue); color: #fff; }
    .detail-actions { display: flex; align-items: center; gap: 8px; }
    .detail-tabs { display: flex; gap: 8px; margin: 8px 0 14px; }
    .detail-tab { border: 1px solid var(--color-border); background: #fff; color: var(--color-text-muted); border-radius: var(--radius-pill); padding: 7px 18px; font-size: 13px; cursor: pointer; }
    .detail-tab.active { border-color: var(--color-business-blue); font-weight: 700; }
    .detail-table-wrap { overflow-x: auto; border: 1px solid var(--color-card-border); border-radius: var(--radius-md); }
    .detail-table { min-width: 460px; width: 100%; border-collapse: collapse; font-size: 12px; }
    .detail-table th { background: var(--color-subtle-bg); color: var(--color-text-secondary); font-weight: 700; text-align: left; padding: 10px; white-space: nowrap; }
    .detail-table td { padding: 10px; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border-light); white-space: nowrap; }
    .detail-table tbody tr:last-child td { border-bottom: 0; }
    .drill-value { cursor: pointer; display: inline-flex; align-items: baseline; gap: 3px; color: var(--color-business-blue); }
    .drill-value:after { content: '\203A'; font-size: 14px; font-weight: 800; color: #3C84EA; transform: translateY(-1px); }
    .drill-value .manager-value, .drill-value .sub-unit { color: #3C84EA; }
    .drill-value:active { opacity: .72; }
    .jumpable { cursor: pointer; position: relative; }
    .jumpable:after { content: '\203A'; position: absolute; right: 8px; top: 7px; color: #3C84EA; font-size: 15px; font-weight: 800; }
    .jumpable .sub-value, .jumpable .sub-unit { color: #3C84EA; }
    .jumpable:active { transform: scale(.98); opacity: .86; background: var(--color-business-blue-light); }
    .text-red { color: #D84C3F !important; }
    .text-green { color: #3C84EA !important; }
    .card { padding: 10px 12px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; min-height: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--color-text-primary); display: flex; align-items: center; }
    .section-title:before { content: ""; width: 3px; height: 14px; border-radius: var(--radius-pill); background: var(--color-brand-red); margin-right: 7px; }
    .section-meta { font-size: 11px; color: var(--color-text-placeholder); font-weight: 500; }
    .toggle-btn { display: flex; align-items: center; font-size: 12px; color: var(--color-text-muted); cursor: pointer; user-select: none; }
    .toggle-icon { width: 14px; height: 14px; margin-left: 2px; transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toggle-btn.collapsed .toggle-icon { transform: rotate(180deg); }
    .gauge-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .gauge-item { width: 31%; display: flex; flex-direction: column; align-items: center; padding: 4px 2px; }
    .ring-box { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(148,163,184,.08); }
    .ring-inner { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(15,23,42,.05); }
    .ring-value { font-size: 12px; font-weight: 800; line-height: 1.05; color: var(--color-text-primary); }
    .ring-unit, .sub-unit { font-size: 10px; color: var(--color-text-muted); }
    .metric-label { margin-top: 5px; font-size: 12px; color: var(--color-text-muted); text-align: center; white-space: nowrap; font-weight: 500; }
    .sub-metric-row, .manager-sub-row { display: flex; gap: 8px; }
    .sub-metric, .manager-sub { flex: 1; padding: 8px 7px; border-radius: var(--radius-md); background: var(--color-subtle-bg); border: 1px solid var(--color-border-light); overflow: hidden; min-height: 54px; transition: all .16s ease; }
    .manager-sub { background: var(--color-subtle-bg); border: 1px solid var(--color-card-border); }
    .sub-metric.warn, .sub-metric.blue, .sub-metric.green { background: var(--color-subtle-bg); border: 1px solid var(--color-card-border); }
    .sub-metric.warn .sub-value, .sub-metric.warn .sub-unit { color: #3C84EA; }
    .sub-metric.blue .sub-value, .sub-metric.blue .sub-unit { color: #3C84EA; }
    .sub-metric.green .sub-value, .sub-metric.green .sub-unit { color: #3C84EA; }
    .sub-label, .small-label { display: block; font-size: 12px; color: var(--color-text-muted); margin-bottom: 4px; white-space: nowrap; font-weight: 500; }
    .sub-value { font-size: 16px; font-weight: 800; color: var(--color-text-primary); }
    .manager-top-widgets { display: flex; gap: 8px; margin-bottom: 8px; }
    .monthly-metrics { margin-top: 2px; }
    .monthly-title { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 4px; font-size: 12px; color: var(--color-text-primary); font-weight: 800; }
    .monthly-title:after { content: ""; flex: 1; height: 1px; margin-left: 8px; background: var(--color-border-light); }
    .metrics-group-title { margin: 3px 0 3px; color: var(--color-text-muted); font-size: 11px; font-weight: 700; white-space: nowrap; }
    .compact-result-row { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); align-items: stretch; gap: 5px; margin-bottom: 4px; }
    .metrics-group-title.inline { display: flex; align-items: center; margin: 0; }
    .result-pill, .process-card { min-height: 34px; padding: 4px 7px; border-radius: 10px; background: var(--color-subtle-bg); border: 1px solid var(--color-card-border); transition: transform .16s ease, opacity .16s ease; box-sizing: border-box; }
    .result-pill { cursor: pointer; overflow: hidden; }
    .result-pill:active, .process-card.clickable:active { transform: scale(.98); opacity: .82; }
    .mini-label, .process-card .sub-label { display: block; font-size: 12px; line-height: 1.15; color: var(--color-text-muted); margin-bottom: 2px; white-space: nowrap; font-weight: 500; }
    .mini-value, .process-card .manager-value { font-size: 15px; line-height: 1; font-weight: 800; color: #3C84EA; }
    .mini-unit, .process-card .sub-unit { font-size: 10px; color: #3C84EA; margin-left: 1px; }
    .process-card:not(.clickable) .manager-value, .process-card:not(.clickable) .sub-unit { color: #7A8599; }
    .metric-line, .process-value-line { display: flex; align-items: baseline; justify-content: space-between; gap: 3px; color: #3C84EA; }
    .metric-line:after, .process-card.clickable .process-value-line:after { content: none; }
    .process-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px; }
    .process-card { cursor: default; }
    .process-card.clickable { cursor: pointer; }
    .widget-box { background: var(--color-card-bg); border: 1px solid var(--color-card-border); border-radius: 14px; padding: 10px; box-shadow: var(--shadow-card-light); }
    .split-widget { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; text-align: left; position: relative; overflow: hidden; }
    .split-widget:after { display: none; }
    .split-widget:first-child:after { background: rgba(60,132,234,.05); }
    .split-widget .small-label { font-size: 12px; color: var(--color-text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; position: relative; z-index: 2; }
    .split-widget .commission-num { font-size: 22px; color: #3C84EA; font-weight: 800; line-height: 1; position: relative; z-index: 2; letter-spacing: -.2px; }
    .capacity-val { margin-top: 1px; display: flex; align-items: baseline; position: relative; z-index: 2; }
    .capacity-zone { font-size: 18px; font-weight: 800; color: #3C84EA; line-height: 1; }
    .capacity-val .cap-num { font-size: 12px; color: var(--color-text-muted); font-weight: 500; margin-left: 4px; }
    .info-icon { width: 12px; height: 12px; color: var(--color-text-placeholder); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .info-icon svg { width: 100%; height: 100%; stroke-width: 1.5; }
    .manager-value { font-size: 18px; font-weight: 800; }
    .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 4px; }
    .common-tools-header { gap: 10px; }
    .common-search { margin-left: auto; width: 148px; height: 30px; border-radius: var(--radius-pill); border: 1px solid var(--color-border); background: var(--color-subtle-bg); display: flex; align-items: center; padding: 0 10px; transition: all .16s ease; }
    .common-search:focus-within { border-color: var(--color-business-blue-border); box-shadow: 0 0 0 3px rgba(37,99,235,.08); background: #fff; }
    .common-search svg { width: 14px; height: 14px; color: var(--color-text-placeholder); margin-right: 6px; flex-shrink: 0; }
    .common-search input { width: 100%; border: 0; background: transparent; outline: none; font-size: 12px; color: var(--color-text-secondary); }
    .common-search input::placeholder { color: var(--color-text-placeholder); }
    .common-slider-wrap { overflow: hidden; }
    .common-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
    .common-page { min-width: 100%; scroll-snap-align: start; }
    .common-page .menu-grid { padding-top: 2px; }
    .common-dots { display: flex; justify-content: center; gap: 6px; margin-top: 6px; }
    .common-dots span { width: 6px; height: 6px; border-radius: var(--radius-pill); background: #CBD5E1; transition: all .2s; }
    .common-dots span.active { width: 14px; background: var(--color-business-blue); }
    .menu-item.placeholder { visibility: hidden; pointer-events: none; }
    .empty-search-tip { font-size: 12px; color: var(--color-text-placeholder); text-align: center; padding: 8px 0 2px; }
    .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 0; }
    .menu-item:active .icon-box { transform: scale(.96); }
    .icon-box { width: var(--size-icon-box); height: var(--size-icon-box); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; box-shadow: inset 0 0 0 1px rgba(15,23,42,.035); transition: transform .16s ease, background .16s ease; }
    .icon-box svg { width: var(--size-icon); height: var(--size-icon); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-box.illustrated { width: 46px; height: 46px; border-radius: 16px; background: transparent; box-shadow: none; overflow: visible; }
    .icon-box.illustrated svg { width: 46px; height: 46px; stroke-width: 1.45; filter: drop-shadow(0 2px 4px rgba(15,23,42,.06)); }
    .icon-color-1 { background: #EFF6FF; color: #2563EB; }
    .icon-color-2 { background: #FFF7ED; color: #F97316; }
    .icon-color-3 { background: #F0FDFA; color: #0F766E; }
    .icon-color-4 { background: #F5F3FF; color: #7C3AED; }
    .menu-name { color: var(--color-text-secondary); font-size: 12px; font-weight: 500; line-height: 1.18; text-align: center; white-space: normal; }
    .glass-header { background: rgba(244,246,249,.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 3; padding: 40px 16px 12px; border-bottom: 1px solid rgba(226,232,240,.7); }
    .app-page-title { display: block; font-size: 20px; font-weight: 800; color: var(--color-text-primary); margin-bottom: 12px; letter-spacing: 0; }
    .search-card { height: 36px; background: #fff; border-radius: var(--radius-pill); display: flex; align-items: center; padding: 0 12px; color: var(--color-text-placeholder); font-size: 14px; border: 1px solid var(--color-border); box-shadow: var(--shadow-card-light); }
    .search-card svg { width: 16px; height: 16px; margin-right: 8px; }
    .app-shell { padding: 12px; }
    .app-card { background: #fff; border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--color-card-border); box-shadow: var(--shadow-card); }
    .app-group-title { font-size: 14px; font-weight: 800; color: var(--color-text-primary); margin: 0 0 10px; display: flex; align-items: center; }
    .app-group-title .mark { width: 3px; height: 14px; border-radius: var(--radius-pill); margin-right: 8px; }
    .mark-blue { background: var(--color-business-blue); } .mark-orange { background: var(--color-warning); } .mark-teal { background: #0F766E; }
    .divider { width: 100%; height: 1px; background-color: var(--color-border-light); margin: 14px 0 15px; }
    .placeholder-view { margin: 80px 22px 0; height: 180px; background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--color-card-border); display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; color: var(--color-text-placeholder); box-shadow: var(--shadow-card); }
    .placeholder-icon { width: 36px; height: 36px; border-radius: 11px; border: 2px solid var(--color-business-blue); margin-bottom: 10px; } .placeholder-icon.user { border-radius: 50%; }
    .placeholder-title { font-size: 16px; font-weight: 800; color: var(--color-text-primary); margin-bottom: 5px; } .placeholder-desc { width: 240px; font-size: 12px; line-height: 1.5; }
    .tabbar { position: absolute; left: 0; right: 0; bottom: 0; height: var(--height-tabbar); background: rgba(255,255,255,.98); border-top: 1px solid var(--color-border); display: flex; z-index: 10; box-shadow: 0 -8px 24px rgba(15,23,42,.05); }
    .tab-item { color: var(--color-text-placeholder); flex: 1; height: var(--height-tabbar); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: color .18s ease; }

          input.focus();
          const len = input.value.length;
          input.setSelectionRange(len, len);
        }

    function updateCommonDots() {
      document.querySelectorAll('.common-dots span').forEach((dot, idx) => {
        dot.classList.toggle('active', idx === state.commonPage);
      });

    function bindCommonSlider() {
      const slider = document.getElementById('commonSlider');
      if (!slider) return;
      const pageCount = Number(slider.dataset.pageCount || '0');
      if (!pageCount) return;
      const pageWidth = slider.clientWidth || slider.parentElement.clientWidth || 1;
      const safePage = Math.max(0, Math.min(state.commonPage || 0, pageCount - 1));
      state.commonPage = safePage;
      slider.scrollLeft = safePage * pageWidth;
      slider.onscroll = function() {
        const width = slider.clientWidth || slider.parentElement.clientWidth || 1;
        const nextPage = Math.round(slider.scrollLeft / width);
        if (nextPage !== state.commonPage) {
          state.commonPage = nextPage;
          updateCommonDots();
        }
      };
      updateCommonDots();
    }

      document.getElementById('tabbar').innerHTML = state.tabs.map(t=>{
        const badge = t.key === 'tickets' && state.ticketsPending > 0 ? `<span class="tab-badge">${state.ticketsPending > 99 ? '99+' : state.ticketsPending}</span>` : '';

      }).join(''); 
    }
    
    function render(){ 
      const content = document.getElementById('pageContent'); 
      content.className = `content ${state.tab === 'apps' ? 'apps' : ''}`; 
      content.innerHTML = state.tab === 'home' ? renderHome() : state.tab === 'apps' ? renderApps() : renderPlaceholder(state.tab);

      if (state.tab === 'home') bindCommonSlider();
